name: Check PR format

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - main

env:
  CHECK_APP_ID: ${{ secrets.CHECK_APP_ID }}
  CHECK_APP_PRIVATE_KEY: ${{ secrets.CHECK_APP_PRIVATE_KEY }}
  SUFEDOCS_CHECK_REPO_NAME: sufedocs-check
  SUFEDOCS_CHECK_REPO_OWNER: XSUFE
  SUFEDOCS_SITE_URL: ${{ secrets.SUFEDOCS_SITE_URL }}
  SUFEDOCS_SITE_TOKEN: ${{ secrets.SUFEDOCS_SITE_TOKEN }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_DATA_BUCKET: ${{ secrets.R2_DATA_BUCKET }}
  R2_FILE_BUCKET: ${{ secrets.R2_FILE_BUCKET }}

jobs:
  check-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Show log
        run: git log -5

      - name: Check for YAML files in root directory
        run: |
          files=$(find . -maxdepth 1 -type f \( -name "*.yml" -o -name "*.yaml" \))
          if [ -n "$files" ]; then
            echo "根目录下发现 yml 或 yaml 文件，请移动到 metadata 目录中：" > comment.txt
            echo "$files" >> comment.txt
            exit 1
          fi

      - id: pdfium
        name: Get pdfium-binaries latest
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          owner: bblanchon
          repo: pdfium-binaries

      - id: app-token
        name: Create GitHub App token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.CHECK_APP_ID }}
          private-key: ${{ env.CHECK_APP_PRIVATE_KEY }}
          owner: ${{ env.SUFEDOCS_CHECK_REPO_OWNER }}
          repositories: ${{ env.SUFEDOCS_CHECK_REPO_NAME }}

      - id: check
        name: Get sufedocs-check release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          release="$(gh api repos/$SUFEDOCS_CHECK_REPO_OWNER/$SUFEDOCS_CHECK_REPO_NAME/releases/latest --jq .tag_name)"
          echo "release=$release" >> "$GITHUB_OUTPUT"

      - name: Download release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          wget https://github.com/bblanchon/pdfium-binaries/releases/download/${{ steps.pdfium.outputs.release }}/pdfium-linux-x64.tgz
          tar --overwrite -zxvf pdfium-linux-x64.tgz
          gh release download "${{ steps.check.outputs.release }}" \
            --repo "$SUFEDOCS_CHECK_REPO_OWNER/$SUFEDOCS_CHECK_REPO_NAME" \
            --pattern upload-metadata \
            --pattern check-format \
            --clobber
          chmod 777 upload-metadata
          chmod 777 check-format

      - name: Check
        env:
          METADATA_DIR: ./metadata
        run: ./check-format > comment.txt 2>&1

      - name: Debug
        if: always()
        run: cat ./comment.txt

      - name: Read failure comment
        if: failure()
        id: comment
        run: |
          echo "body<<SUFEDOCS_HEREDOC_EOF" >> $GITHUB_OUTPUT
          cat comment.txt                  >> $GITHUB_OUTPUT
          echo "SUFEDOCS_HEREDOC_EOF"       >> $GITHUB_OUTPUT

      - name: Request changes review
        if: github.event_name == 'pull_request_target' && failure()
        uses: ntsd/auto-request-changes-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-message: ${{ steps.comment.outputs.body }}

      - name: Dismiss previous change requests
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            for (const review of reviews) {
              if (
                review.state === 'CHANGES_REQUESTED' &&
                review.user.login === 'github-actions[bot]'
              ) {
                await github.rest.pulls.dismissReview({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  pull_number:  context.payload.pull_request.number,
                  review_id:    review.id,
                  message:      '格式检查已通过，此更改请求已解决。'
                });
              }
            }
